name: Build Go project

on:
  pull_request:
#    paths:
#      - "server/**"
  push:
    branches: ["main"]
#    paths:
#      - "server/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...
