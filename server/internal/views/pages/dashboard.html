<style>
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--spacing-lg);
        padding: 20px 0;
    }

    .device-card {
        padding: var(--spacing-lg);
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .device-card:hover {
        transform: translateY(-8px);
        box-shadow: var(--shadow-lg);
        border-color: var(--color-primary);
    }

    .card-header h3 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--color-text-main);
    }

    .location-tag {
        display: inline-flex;
        align-items: center;
        font-size: 0.85rem;
        color: var(--color-primary);
        background: rgba(0, 122, 255, 0.1);
        padding: 4px 10px;
        border-radius: var(--radius-xl);
        margin-top: 8px;
        font-weight: 500;
    }

    .mac-address {
        font-size: 0.7rem;
        color: var(--color-text-muted);
        margin-top: 5px;
    }

    .metrics-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-sm);
        margin: var(--spacing-lg) 0;
    }

    .metric-box {
        background: #fcfcfc;
        padding: var(--spacing-md);
        border-radius: var(--radius-lg);
        border: 1px solid #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .metric-box.temp { border-bottom: 3px solid var(--color-temp); }
    .metric-box.hum { border-bottom: 3px solid var(--color-hum); }

    .metric-val {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 4px;
    }

    .metric-label {
        font-size: 0.75rem;
        color: var(--color-text-sub);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .card-footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8rem;
        color: var(--color-text-sub);
        padding-top: 15px;
        border-top: 1px solid var(--color-bg);
    }

    .status-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 500;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }

    .dot.online { background-color: var(--color-success); box-shadow: 0 0 8px var(--color-success); }
    .dot.offline { background-color: var(--color-text-sub); }

    .device-id-small {
        font-family: monospace;
        font-size: 0.7rem;
        opacity: 0.5;
    }

    .updated-at {
        font-size: 0.75rem;
        margin-top: 10px;
        color: var(--color-text-muted);
    }
</style>

<h2>Devices</h2>

<div class="dashboard-grid">
    {{range .Devices}}
        {{template "partials/device_card" .}}
    {{else}}
    <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: white; border-radius: 20px;">
        <p style="color: var(--color-text-sub); font-size: 1.1rem;">No devices found.</p>
    </div>
    {{end}}
</div>
