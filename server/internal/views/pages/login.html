<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sensor Stream</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { background: var(--color-bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 20px; border-radius: var(--radius-xl); box-shadow: var(--shadow-md); text-align: center; }
        h1 { font-weight: 700; margin-bottom: 10px; color: var(--color-text-main); }
        p { color: var(--color-text-sub); margin-bottom: 30px; }
        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 12px; border: 1px solid #dcdcdc; border-radius: var(--radius-md);
            background: white; cursor: pointer; font-size: 1rem; font-weight: 500;
            transition: background 0.2s;
        }
        .google-btn:hover { background: #f9f9f9; }
        .google-icon { width: 20px; height: 20px; }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--color-text-main);
            font-weight: 500;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Authenticating...</div>
</div>

<div class="login-card">
    <h1>Welcome</h1>
    <p>Sign in to manage your smart home sensors</p>
    
    <button class="google-btn" id="google-login">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon" alt="Google">
        Continue with Google
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "{{.FirebaseApiKey}}",
        authDomain: "{{.FirebaseAuthDomain}}",
        projectId: "{{.FirebaseProjectId}}"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const loader = document.getElementById('loader');

    document.getElementById('google-login').addEventListener('click', async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            
            // Show full screen loader
            loader.style.display = 'flex';

            const token = await result.user.getIdToken();
            
            const response = await fetch('/auth/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: token })
            });

            if (response.ok) {
                window.location.href = '/admin/';
            } else {
                loader.style.display = 'none';
                alert('Authentication failed on server side');
            }
        } catch (error) {
            loader.style.display = 'none';
            console.error("Auth Error:", error);
            if (error.code !== 'auth/popup-closed-by-user') {
                alert("Google Login failed: " + error.message);
            }
        }
    });
</script>

</body>
</html>
