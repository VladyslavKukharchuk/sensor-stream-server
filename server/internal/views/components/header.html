<header>
    <a href="/admin" style="text-decoration: none; color: inherit;">
        <h1 style="margin: 0;">Sensor Stream</h1>
    </a>

    <nav style="display: flex; align-items: center; gap: 20px;">
        <button id="logout-btn" class="btn" style="background: none; border: 1px solid rgba(255,255,255,0.3); color: white;">Logout</button>
    </nav>
</header>

<script>
    document.getElementById('logout-btn')?.addEventListener('click', async () => {
        try {
            const response = await fetch('/auth/session', { method: 'DELETE' });
            if (response.ok) {
                window.location.href = '/admin/login';
            }
        } catch (error) {
            console.error('Logout failed:', error);
        }
    });
</script>
