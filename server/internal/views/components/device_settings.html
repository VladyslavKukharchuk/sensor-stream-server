<style>
    .settings-card { background: #fff; padding: 20px; border-radius: var(--radius-md); border: 1px solid #eee; margin-top: 30px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.9rem; color: var(--color-text-sub); margin-bottom: 5px; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: var(--radius-sm); box-sizing: border-box; }
</style>

<section class="settings-card">
    <h3>Device Settings</h3>
    <form action="/admin/devices/{{.ID}}" method="POST">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{.Name}}" placeholder="e.g. Living Room Sensor">
        </div>
        <div class="form-group">
            <label for="location">Location / Room</label>
            <input type="text" id="location" name="location" value="{{.Location}}" placeholder="e.g. Kitchen, Greenhouse">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</section>
